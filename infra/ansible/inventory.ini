# ── inventory.ini ───────────────────────────────────────
# WHO to configure. Lists all servers, grouped by role.
#
# Format:
#   [group_name]
#   hostname  ansible_host=IP  extra_vars...
#
# Groups let you run tasks on specific sets of servers.
# e.g. "install Rancher only on the [rancher] group"

[rancher]
# The VM that will run Rancher (K8s management UI)
rancher-server  ansible_host=20.123.3.31

[k8s_nodes]
# The VM(s) that will be K8s worker nodes (where our app runs)
# You can add more nodes here later — just add another line
k8s-node  ansible_host=20.107.210.13

[all:vars]
# Variables that apply to ALL hosts in this inventory.
# ansible_ssh_private_key_file = which SSH key to use (the one Terraform generated)
ansible_ssh_private_key_file = ../terraform/wanderer-key.pem

# ── ansible.cfg ─────────────────────────────────────────
# Ansible configuration file. Controls how Ansible behaves.
# Ansible looks for this file in the current directory first.

[defaults]
# Path to the inventory file (list of servers)
inventory = inventory.ini

# Don't create .retry files on failure (just clutter)
retry_files_enabled = False

# SSH user for all hosts (unless overridden per host)
remote_user = azureuser

# Don't gather all system facts by default (speeds things up)
# We'll gather them only when needed in playbooks
gathering = smart

[ssh_connection]
# SSH arguments:
# -o StrictHostKeyChecking=no  → don't ask "are you sure you want to connect?" on first SSH
# -o UserKnownHostsFile=/dev/null  → don't save host keys (VMs are temporary)
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[privilege_escalation]
# Most tasks need root (installing packages, starting services).
# This tells Ansible to use "sudo" automatically.
# Like typing "sudo" before every command — but Ansible does it for you.
become = True
become_method = sudo

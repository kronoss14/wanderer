# ── elasticsearch.yaml ──────────────────────────────────
# Elasticsearch for centralized logging.
#
# Architecture:
#   App Pods → stdout/stderr → Kubernetes collects logs
#   → Fluent Bit (DaemonSet on every node) reads logs
#   → sends them to Elasticsearch
#   → you search/view logs via Elasticsearch API
#
# Elasticsearch is also a StatefulSet (it stores data).
# Same reasoning as MongoDB — needs stable identity and persistent storage.

---
# ── Namespace for logging stack ──
apiVersion: v1
kind: Namespace
metadata:
  name: logging

---
# ── Elasticsearch StatefulSet ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: logging
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0

          ports:
            - containerPort: 9200    # REST API (search, index)
              name: http
            - containerPort: 9300    # Node-to-node communication
              name: transport

          env:
            # Single-node mode (no clustering — fine for learning)
            - name: discovery.type
              value: "single-node"
            # Disable security (simplifies setup for learning)
            - name: xpack.security.enabled
              value: "false"
            # Limit JVM heap size (Elasticsearch is Java-based, very memory hungry)
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"

          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi

---
# ── Elasticsearch Service ──
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9300
      targetPort: 9300
      name: transport

---
# ── Fluent Bit ──
# Fluent Bit is a lightweight log collector.
# It runs as a DAEMONSET — one Pod per node (remember from Nana's video).
# It reads container logs from the node's filesystem and ships them to Elasticsearch.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: logging

---
# ── Fluent Bit ConfigMap ──
# Configuration for what logs to collect and where to send them.

apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        Refresh_Interval  10
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On

    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elasticsearch.logging.svc.cluster.local
        Port            9200
        Logstash_Format On
        Logstash_Prefix k8s-logs
        Suppress_Type_Name On
        Replace_Dots    On

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

---
# ── Fluent Bit DaemonSet ──
# DaemonSet = one Pod per node. Every node gets a Fluent Bit instance
# that reads logs from ALL containers on that node.
# Remember Nana's explanation: DaemonSet use cases = log collectors, monitoring agents.
# This is exactly that use case.

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        # Run on ALL nodes, even tainted control-plane nodes
        - operator: Exists

      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2

          volumeMounts:
            # Mount node's container logs (read-only)
            - name: varlog
              mountPath: /var/log
              readOnly: true
            # Mount the config
            - name: config
              mountPath: /fluent-bit/etc/

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      volumes:
        - name: varlog
          hostPath:             # hostPath = mount from the NODE's filesystem
            path: /var/log      # where K8s stores container logs
        - name: config
          configMap:
            name: fluent-bit-config
